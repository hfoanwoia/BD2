services:
  - type: web
    name: influencer-crm-admin
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: INTEGRATION_MODE
        value: mock
      - key: DATABASE_PATH
        value: /tmp/commerce.db
